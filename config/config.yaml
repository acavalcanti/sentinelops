# Options are 'environment: local' or 'environment: cloud'
environment: local

llm:
  provider: ollama
  model: "phi:latest"

services:
  ollama:
    url: "http://localhost:11434"
  qdrant:
    host: "localhost"
    port: 6333
  llm:
    url: ""
    api_key: ""

analysis:
  prompt: |
    You are an SRE assistant.

    Analyze the log and explain the issue in a concise way.
    Do not create additional tasks or examples.

    Log:
    {log}

  fallback_text: "No analysis generated"

  confidence:
    base: 0.6
    variance_min: 0.1
    variance_max: 0.3
    max: 1.0
    precision: 3

metrics:
  keys:
    status: "status"

  values:
    success: "success"
    advisory_success:
      - "skipped"
      - "blocked"
      - "advisory"

  health:
    success_bias: 0.7

  weights:
    execution: 0.3
    health: 0.5
    recurrence: 0.2

  round: 2

router:
  advisory:
    error: "Execution is advisory-only. No real action was performed."

history:
  file: "data/history.json"
  limit: 20

policy:
  enabled: true
  default_risk: 0.3
  rules:
    restart_deployment:
      allowed: true
      risk: low
    scale_deployment:
      allowed: true
      risk: medium
    cleanup_volume:
      allowed: true
      risk: high

agents:
  defaults:
    unknown_signature: "unknown"
    unknown_confidence: 0.4
    low_confidence: 0.3

ui:
  confidence_note: "⚠️ Confidence includes controlled variance to simulate real-world uncertainty."
  arbiter_label: "Arbiter Explanation"
  arbiter_default: "No explanation available"
  flow_delay: 0.1
  execution_empty: "No execution"
  metrics_empty: "No metrics available"

embedding:
  model: all-MiniLM-L6-v2
  dimension: 384

decision:
  target_pattern: "\\w+-service"
  default_target: "unknown-service"
  default_namespace: "default"

arbiter:
  weights:
    analysis: 0.4
    rag: 0.3
    decision: 0.3

  thresholds:
    hard: 0.3
    review: 0.6

  precision: 3

execution:
  blocked_status: "blocked"
  skipped_status: "advisory"
  mode: local

feedback:
  min_score: 0.6

rag:
  retrieval:
    collection: "incidents"
    top_k: 3
    default_confidence: 0.3
    norm_score: 0.95
    min_score: 0.2
    
